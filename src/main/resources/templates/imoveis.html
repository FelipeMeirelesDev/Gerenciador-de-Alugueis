<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Imóveis</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <!-- Barra Lateral -->
    <aside class="sidebar">
        <h2>Gerenciador de Aluguéis</h2>
        <ul>
            <li>📊 Geral</li>
            <li>🏠 Imóveis</li>
            <li>👤 Inquilinos</li>
            <li>📄 Contratos</li>
            <li>💰 Pagamentos</li>
            <li>⚙️ Configurações</li>
        </ul>
    </aside>

    <main class="content">

        <h1>Cadastro de Imóvel</h1>

        <form class="form" id="formImovel">

            <div class="form-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" name="bairro" required>
            </div>

            <div class="form-group">
                <label for="rua">Rua</label>
                <input type="text" id="rua" name="rua" required>
            </div>

            <div class="form-group">
                <label for="numero">Número</label>
                <input type="text" id="numero" name="numero" required>
            </div>

            <div class="form-group">
                <label for="valorAluguel">Valor do Aluguel (Mensal)</label>
                <div class="input-money">
                    <span>R$</span>
                    <input type="number" step="0.01" id="valorAluguel" name="valorAluguel" required>
                </div>
            </div>

            <div class="form-group">
                <label for="disponibilidade">Disponível?</label>
                <select id="disponibilidade" name="disponibilidade">
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>

            <button type="submit">Salvar</button>

        </form>

        <p id="mensagem"></p>

    </main>

</div>

<script src="/js/imovel.js"></script>
</body>
</html>
