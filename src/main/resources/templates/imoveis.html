<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Imóveis</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <!-- Barra Lateral -->
    <aside class="sidebar">
        <h2>Gerenciador de Aluguéis</h2>
        <ul>
            <li>📊 Geral</li>
            <li>🏠 Imóveis</li>
            <li>👤 Inquilinos</li>
            <li>📄 Contratos</li>
            <li>💰 Pagamentos</li>
            <li>⚙️ Configurações</li>
        </ul>
    </aside>

    <main class="content">

        <h1>Cadastro de Imóvel</h1>

        <form class="form">

            <div class="form-group">
                <label>Bairro</label>
                <input type="text" name="bairro" required>
            </div>

            <div class="form-group">
                <label>Rua</label>
                <input type="text" name="rua" required>
            </div>

            <div class="form-group">
                <label>Número</label>
                <input type="text" name="numero" required>
            </div>

            <div class="form-group">
                <label>Valor do Aluguel (Mensal)</label>

                <div class="input-money">
                    <span>R$</span>
                    <input type="number" step="0.01" name="valor_aluguel" required>
                </div>

            </div>

            <div class="form-group">
                <label>Disponível?</label>
                <select name="disponibilidade">
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>

            <button type="submit">Salvar</button>

        </form>

    </main>

</div>

</body>
</html>
