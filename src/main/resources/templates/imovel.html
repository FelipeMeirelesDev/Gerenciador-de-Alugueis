<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Imóveis</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <h2>Gerenciador de Aluguéis</h2>
            <p>Painel administrativo</p>
        </div>

        <nav class="menu">
            <a th:href="@{/pagina/inicio}" class="menu-item">
                <span class="icon">📊</span>
                <span>Geral</span>
            </a>

            <a th:href="@{/pagina/imovel}" class="menu-item active">
                <span class="icon">🏠</span>
                <span>Imóveis</span>
            </a>

            <a th:href="@{/pagina/inquilino}" class="menu-item">
                <span class="icon">👤</span>
                <span>Inquilinos</span>
            </a>

            <a th:href="@{/pagina/contrato}" class="menu-item">
                <span class="icon">📄</span>
                <span>Contratos</span>
            </a>

            <a th:href="@{/pagina/pagamento}" class="menu-item">
                <span class="icon">💰</span>
                <span>Pagamentos</span>
            </a>

            <a th:href="@{/pagina/configuracao}" class="menu-item">
                <span class="icon">⚙️</span>
                <span>Configurações</span>
            </a>
        </nav>
    </aside>

    <!-- Conteúdo -->
    <main class="content">

        <div class="page-header">
            <h1>Cadastro de Imóvel</h1>
            <p>Preencha as informações do imóvel para cadastro no sistema.</p>
        </div>

        <form class="form" id="formImovel">

            <div class="form-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" name="bairro" placeholder="Ex: Centro" required>
            </div>

            <div class="form-group">
                <label for="rua">Rua</label>
                <input type="text" id="rua" name="rua" placeholder="Ex: Rua das Flores" required>
            </div>

            <div class="form-group">
                <label for="numero">Número</label>
                <input type="text" id="numero" name="numero" placeholder="Ex: 123" required>
            </div>

            <div class="form-group">
                <label for="valorAluguel">Valor do Aluguel (Mensal)</label>
                <div class="input-money">
                    <span>R$</span>
                    <input type="number" step="0.01" id="valorAluguel" name="valorAluguel" placeholder="0,00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="disponibilidade">Disponível?</label>
                <select id="disponibilidade" name="disponibilidade">
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>

            <button type="submit">Salvar Imóvel</button>

        </form>

        <p id="mensagem" class="mensagem"></p>

    </main>

</div>

<script th:src="@{/js/imovel.js}"></script>
</body>
</html>
